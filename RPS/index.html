<!DOCTYPE HTML>
<html>
<head>
<meta charset="UTF-8">
<title>Rock,Paper,Scissors,Lizard,Spock</title>
<script type="text/javascript" src="rps.js"></script>
<link rel="stylesheet" type="text/css" href="RPS.css"/>
</head>


<body>
	<div class="wrapper">
		<header id="header">
			<h1>Rock, Paper, Scissors, Lizard, Spock</h1>
		</header>
		<div id="container">
			<h2><u>Player 1</u></h2>
			<div class="player">
				<!--p=player-->
				<img src="images/rock.jpg" id="rock_p" "height="150" width="150" onclick="play(0);"/>
				<img src="images/paper.jpg" id="paper_p" "height="100" width="100" onclick="play(1);"/>
				<img src="images/scissors.jpg" id="scissors_p" "height="150" width="150" onclick="play(2);"/>
				<img src="images/lizard.jpg" id="lizard_p" "height="150" width="150" onclick="play(3);"/>
				<img src="images/spock.jpg" id="spock_p" "height="150" width="150" onclick="play(4);"/>
			</div> <!--ends player-->
	
	
			<h2><u>Computer</u></h2>
			<div class="computer">
				<!--c=computer-->
				<img src="images/rock.jpg" "height="150" width="150" id="rock_c"/>
				<img src="images/paper.jpg" "height="100" width="100" id="paper_c"/>
				<img src="images/scissors.jpg" "height="150" width="150" id="scissors_c"/>
				<img src="images/lizard.jpg" id="lizard_c" "height="150" width="150"/>
				<img src="images/spock.jpg" id="spock_c" "height="150" width="150"/>
			</div> <!--ends player-->
		</div>
	</div>
</body>


</html>
