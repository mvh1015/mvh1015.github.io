<!DOCTYPE html>

<html>
	<head>
		<title>Asteroid Avoidance</title>
		<meta charset="utf-8">
		
		<link href="game.css" rel="stylesheet" type="text/css">
		
		<script type="text/javascript" 
				src="http://ajax.googleapis.com/ajax/libs/jquery/1/jquery.min.js">
		</script>
		<script type="text/javascript" src="game.js"></script>
		
		
		
		<script src="http://code.jquery.com/jquery-latest.min.js" type="text/javascript"></script>
		<script type="text/javascript">
         // speed in milliseconds
         var scrollSpeed = 70;

         // set the default position
         var current = 0;

         // set the direction
         var direction = 'h';

         function bgscroll() {

             // 1 pixel row at a time
             current -= 1;

             // move the background with backgrond-position css properties
             $('#gameCanvas').css("backgroundPosition", (direction == 'h') ? current + "px 0" : "0 " + current + "px");

         }

         //Calls the scrolling function repeatedly
         setInterval("bgscroll()", scrollSpeed);
		 
		 
    </script>
	<style type="text/css">
        #gameCanvas {
            background-image: url("images/background.jpg");
        }
    </style>
	</head>
	
	<body>
		<div id="game">
			<div id="gameUI">
				<div id="gameIntro">
					<h1>Asteroid Avoidance</h1>
					<p>Click play and then presss any key to start.</p>
					<p>Use Arrow Keys to move.</p>
					<p>Use Space to shoot!</p>
					<p><a id="gamePlay" class="button" href="">Play</a></p>
				</div>
				<div id="gameStats">
					<p>Time: <span class="gameScore"></span> seconds</p>
					<p><a class="gameReset" href="">Reset</a></p>
				</div>
				<div id="gameComplete">
					<h1>Game over!</h1>
					<p>You survived for <span class="gameScore"></span> seconds.</p>
					<p><a class="gameReset button" href="">Play again</a></p>
				</div>
			</div>
			<canvas id="gameCanvas" width="800" height="600">
				<!--Insert fallback content here -->
			</canvas>
			<audio id="gameSoundBackground" loop>
				
				<source src="sounds/background.mp3">
			</audio>
			<audio id="gameSoundThrust" loop>
				<source src="sounds/thrust.ogg">
				<source src="sounds/thrust.mp3">
			</audio>
			<audio id="gameSoundDeath">
				<source src="sounds/death.ogg">
				<source src="sounds/death.mp3">
			</audio>
			
			<audio id="gameSoundShoot">
				<source src="sounds/shoot.mp3">
			</audio>
		<div>
	</body>
</html>
